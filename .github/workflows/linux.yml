name: Linux

on: [workflow_dispatch, pull_request, push]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Debug

jobs:
  build:
    name: ${{matrix.os}}-${{matrix.config.label}}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        config:
          - {label: "gcc-shared-release",      cc: gcc,   cxx: g++,     shared: ON,  build: "Release", flags: "",                               cmake_args: ""}
          - {label: "gcc-static-release",      cc: gcc,   cxx: g++,     shared: OFF, build: "Release", flags: "",                               cmake_args: ""}
          - {label: "clang-shared-release",    cc: clang, cxx: clang++, shared: ON,  build: "Release", flags: "-fprofile-update=prefer-atomic", cmake_args: "", coverage: true}
          - {label: "clang-static-release",    cc: clang, cxx: clang++, shared: OFF, build: "Release", flags: "",                               cmake_args: ""}
          - {label: "clang-shared-debug-tsan", cc: clang, cxx: clang++, shared: ON,  build: "Debug",   flags: "-O1",                            cmake_args: "-DSANITIZE=ON -DSANITIZE_THREAD=ON"}
          - {label: "clang-shared-debug-asan", cc: clang, cxx: clang++, shared: ON,  build: "Debug",   flags: "-O1",                            cmake_args: "-DSANITIZE=ON -DSANITIZE_ADDRESS=ON"}
          - {label: "clang-shared-debug-usan", cc: clang, cxx: clang++, shared: ON,  build: "Debug",   flags: "-O1",                            cmake_args: "-DSANITIZE=ON -DSANITIZE_UNDEFINED=ON"}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # - name: Set up Homebrew
      #   uses: Homebrew/actions/setup-homebrew@master

      - name: Install Packages
        run: |
             sudo apt update
             sudo apt install llvm coreutils libboost-dev libboost-stacktrace-dev libsdl2-dev libuv1-dev libfmt-dev libzstd-dev doxygen graphviz

      - name: Run CMake
        working-directory: ${{github.workspace}}
        # env:
        #   CMAKE_PREFIX_PATH: /home/linuxbrew
        # Download libfmt from source, as the packaged one is too old
        run: |
             mkdir build
             cd build
             cmake .. \
                   -DBUILD_SHARED_LIBS=${{matrix.config.shared}} -DCMAKE_BUILD_TYPE=${{matrix.config.build}} \
                   -DCMAKE_C_FLAGS="${{matrix.config.flags}}" -DCMAKE_CXX_FLAGS="${{matrix.config.flags}}" \
                   -DCMAKE_C_COMPILER="${{matrix.config.cc}}" -DCMAKE_CXX_COMPILER="${{matrix.config.cxx}}" \
                   -DCOVERAGE="${{matrix.config.coverage}}" \
                   -DARCH_NATIVE=ON -DBUILD_TESTING=ON -DBUILD_DOCS=ON -DOWN_FMT=ON -DLIBSG_STACKTRACE=ON \
                   ${{matrix.config.cmake_args}}

      - name: Build
        working-directory: ${{github.workspace}}/build
        run: MAKEFLAGS=-j$(nproc) cmake --build .

      - name: Install
        working-directory: ${{github.workspace}}/build
        run: cmake --install . --prefix ../prefix

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest --output-on-failure

      - name: List dependencies
        working-directory: ${{github.workspace}}/build
        run: ldd test/sg_test

      - name: Generate coverage report
        working-directory: ${{github.workspace}}/build
        if: ${{matrix.config.coverage}}
        run: |
          # Run Code Generation
          cmake --build . --target coverage
          llvm-cov show ./test/sg_test -instr-profile=coverage/sg_test.profraw > coverage/coverage_sg_test.txt

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ (matrix.compiler.cc == 'clang') && (matrix.type.label == 'shared')  }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{github.workspace}}/build/coverage/coverage_sg_test.txt
